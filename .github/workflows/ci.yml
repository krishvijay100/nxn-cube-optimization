name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target cube_tests nxn_cube_py

      - name: Run C++ tests + python bindings test
        run: ctest --test-dir build --output-on-failure

      - name: Install FastAPI service deps
        run: pip install -e "service[dev]"

      - name: Run FastAPI service tests
        run: PYTHONPATH="$PWD/build/bindings" pytest service/tests -v

      - name: Build Docker image
        run: docker build -t nxn-cube:ci .

      - name: Smoke test Docker image
        run: |
          docker run -d --rm --name nxn-cube-smoke -p 8000:8000 nxn-cube:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "healthy after ${i}s"; break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/health
          curl -sf -X POST http://localhost:8000/solve \
            -H "Content-Type: application/json" \
            -d '{"scramble":["R","U","F"]}'
          docker stop nxn-cube-smoke