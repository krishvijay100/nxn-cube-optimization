name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp-tests:
    name: C++ tests + Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target cube_tests nxn_cube_py

      - name: Run C++ tests + python bindings test
        run: ctest --test-dir build --output-on-failure

  service-tests:
    name: FastAPI service tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build pybind module
        run: cmake --build build --target nxn_cube_py

      - name: Install FastAPI service deps
        run: pip install -e "service[dev]"

      - name: Run FastAPI service tests
        run: PYTHONPATH="$PWD/build/bindings" pytest service/tests -v

  docker:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: nxn-cube:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker run -d --rm --name nxn-cube-smoke -p 8000:8000 nxn-cube:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "healthy after ${i}s"; break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/health
          curl -sf -X POST http://localhost:8000/solve \
            -H "Content-Type: application/json" \
            -d '{"scramble":["R","U","F"]}'
          docker stop nxn-cube-smoke
